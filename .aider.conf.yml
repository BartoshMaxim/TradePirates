model: deepseek/deepseek-chat
architect: true
auto-commits: true
no-show-model-warnings: true
attribute-author: true
map-tokens: 2048

read:
  - TODO.md
  - Assets/Scripts/
  
message: |
  You are a Senior Unity Developer specializing in 2D simulation games.
  Adhere to these strict technical requirements:
  1. Use 'PirateGame.Core' namespace for all new scripts.
  2. Use '[SerializeField] private' for all variables exposed to the Inspector.
  3. Use C# PascalCase for methods and public properties, _camelCase for private fields.
  4. Comments must be in English, but keep them concise and technical.
  5. Avoid using 'GameObject.Find' or 'SendMessage'. Prefer direct references or Events.
  6. When modifying TODO.md, only mark tasks as [x] once the build check passes.

extra-params:
  cache_control: true
  max_tokens: 8192 
dark-mode: true
chat-language: english
stream: false